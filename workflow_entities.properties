# ==============================================
# Workflow Entities Configuration
# ==============================================
workflow.entities = customercomplaint, \
					rollorder, \
					maintenance, \
					machine, \
					machinedie, \
					order, \
					precutorder, \
					resourcesbooking, \
					correctiveactionrequest, \
					change, \
					rca, \
					qualityevent, \
					incident

# ==============================================
# Customer Complaint Workflow
# ==============================================
workflow.customercomplaint.actions = start_workflow, \
										maker_approve, \
										send_back, \
										cancel_workflow, \
										checker_approve, \
										reject, \
										final_approval, \
										close
workflow.customercomplaint.start_workflow.steps = status, \
													assignment, \
													notification
workflow.customercomplaint.start_workflow.state = DRAFT
workflow.customercomplaint.start_workflow.action-type = start_workflow
workflow.customercomplaint.start_workflow.workflow-step = start_workflow
workflow.customercomplaint.start_workflow.role = author
workflow.customercomplaint.start_workflow.notification-message = Workflow started for customer complaint

workflow.customercomplaint.maker_approve.steps = status, \
													assignment, \
													notification
workflow.customercomplaint.maker_approve.state = SUBMITTED
workflow.customercomplaint.maker_approve.action-type = maker_approve
workflow.customercomplaint.maker_approve.workflow-step = maker_approve
workflow.customercomplaint.maker_approve.role = reviewer
workflow.customercomplaint.maker_approve.notification-message = Customer complaint record been approved by author

workflow.customercomplaint.send_back.steps = status, \
												notification
workflow.customercomplaint.send_back.state = REWORK
workflow.customercomplaint.send_back.action-type = send_back
workflow.customercomplaint.send_back.workflow-step = send_back
workflow.customercomplaint.send_back.role = author
workflow.customercomplaint.send_back.notification-message = Customer complaint record been send back to author

workflow.customercomplaint.cancel_workflow.steps = status, \
													notification
workflow.customercomplaint.cancel_workflow.state = CANCELLED
workflow.customercomplaint.cancel_workflow.action-type = cancel_workflow
workflow.customercomplaint.cancel_workflow.workflow-step = cancel_workflow
workflow.customercomplaint.cancel_workflow.role = superadmin
workflow.customercomplaint.cancel_workflow.notification-message = Customer complaint record has been cancelled

workflow.customercomplaint.checker_approve.steps = status, \
													assignment, \
													notification
workflow.customercomplaint.checker_approve.state = REVIEWED
workflow.customercomplaint.checker_approve.action-type = checker_approve
workflow.customercomplaint.checker_approve.workflow-step = checker_approve
workflow.customercomplaint.checker_approve.role = approver
workflow.customercomplaint.checker_approve.notification-message = Customer complaint record been approved by reviewer

workflow.customercomplaint.reject.steps = status, \
											notification
workflow.customercomplaint.reject.state = REJECTED
workflow.customercomplaint.reject.action-type = reject
workflow.customercomplaint.reject.workflow-step = reject
workflow.customercomplaint.reject.role = superadmin
workflow.customercomplaint.reject.notification-message = Customer complaint record has been rejected

workflow.customercomplaint.final_approval.steps = status, \
													assignment, \
													notification
workflow.customercomplaint.final_approval.state = APPROVED
workflow.customercomplaint.final_approval.action-type = final_approval
workflow.customercomplaint.final_approval.workflow-step = final_approval
workflow.customercomplaint.final_approval.role = superadmin
workflow.customercomplaint.final_approval.notification-message = Customer complaint record been final approved by approver

workflow.customercomplaint.close.steps = status, \
											notification
workflow.customercomplaint.close.state = CLOSED
workflow.customercomplaint.close.action-type = close
workflow.customercomplaint.close.workflow-step = close
workflow.customercomplaint.close.role = superadmin
workflow.customercomplaint.close.notification-message = Customer complaint record has been close

# End of CustomerComplaint Workflow

