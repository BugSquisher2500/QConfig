# ===============================
# JWT Configuration
# ===============================

# Secret key (MUST be at least 32 characters for HS256)
jwt.secret = qdiasysqualitybuiltinnotboltedon

# Token validity in seconds (10 hours here)
jwt.expiry = 36000

# Optional: issuer (recommended for validation)
jwt.issuer = qdiasys

qdiasys.security.jwt.enabled = true
