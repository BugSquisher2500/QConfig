action.policy.rules.Order.author.REWORK = edit, resubmit, start_workflow, cancel_workflow, maker_approve
action.policy.rules.Order.superadmin.REWORK = edit, resubmit, start_workflow, cancel_workflow, maker_approve

# --- Checker / Reviewer Stage ---
action.policy.rules.Order.checker.SUBMITTED = check, review, reject, checker_approve, send_back
action.policy.rules.Order.reviewer.SUBMITTED = check, review, reject, checker_approve, send_back
action.policy.rules.Order.superadmin.SUBMITTED = check, review, reject, checker_approve, send_back

# --- Approver Stage ---
action.policy.rules.Order.approver.REVIEWED = approve, reject, final_approval, send_back
action.policy.rules.Order.approver.CHECKED = approve, reject, final_approval, send_back
action.policy.rules.Order.superadmin.REVIEWED = approve, reject, final_approval, send_back
action.policy.rules.Order.superadmin.CHECKED = approve, reject, final_approval, send_back

# --- Planning Stage ---
# After final approval, planner starts planning → creates BOM → sends for material dispensing
action.policy.rules.Order.planner.APPROVED = plan, start_planning
action.policy.rules.Order.superadmin.APPROVED = plan, start_planning

# Planner is actively planning
action.policy.rules.Order.planner.PLANNING = create_bom, update_bom, send_for_dispense, complete_planning
action.policy.rules.Order.superadmin.PLANNING = create_bom, update_bom, send_for_dispense, complete_planning

# --- Material Dispensing Stage ---
# Once BOM ready → Warehouse dispenses materials
action.policy.rules.Order.warehouse.BOM_READY = dispense_material, mark_dispensed
action.policy.rules.Order.superadmin.BOM_READY = dispense_material, mark_dispensed, start_process

# --- Production Stage ---
# Production starts after material is dispensed
action.policy.rules.Order.production.MATERIAL_DISPENSED = start_process
action.policy.rules.Order.production.IN_PROCESS = finish_process, send_for_qa
action.policy.rules.Order.superadmin.IN_PROCESS = finish_process, send_for_qa

# --- QA Stage ---
# QA verifies intermediate or final products
action.policy.rules.Order.qa.IN_PROCESS = receive_sample, test_in_process, send_feedback
action.policy.rules.Order.qa.QA_REVIEW = approve_batch, complete
action.policy.rules.Order.superadmin.QA_REVIEW = approve_batch, complete

# --- Completed Stage ---
# After QA completes → workflow ends
action.policy.rules.Order.production.COMPLETED = archive_order, close_order
action.policy.rules.Order.superadmin.COMPLETED = archive_order, close_order

